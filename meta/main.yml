galaxy_info:
  author: LachlanStone
  description: >
    Deploy and configure Caddy web server with optional Cloudflare DNS plugin,
    modular Caddyfile templating, and systemd integration.
    Supports both package (DNF/COPR) and custom binary install modes.
  company: ""
  license: MIT
  min_ansible_version: "2.14"

  platforms:
    - name: Fedora
      versions:
        - all
    - name: EL
      versions:
        - "9"
        - "10"

  galaxy_tags:
    - caddy
    - web
    - proxy
    - reverse_proxy
    - cloudflare
    - tls
    - https
    - systemd

dependencies: []
